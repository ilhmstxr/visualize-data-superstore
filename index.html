<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sales Hierarchy Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --node-branch: #6366f1;
            --node-leaf: #10b981;
            --link-color: #334155;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-group p {
            margin: 0.25rem 0 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        #viz-area {
            flex-grow: 1;
            position: relative;
            cursor: grab;
        }

        #viz-area:active {
            cursor: grabbing;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: #2d3a4f;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Tooltip style */
        .tooltip {
            position: absolute;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--accent);
            border-radius: 0.75rem;
            pointer-events: none;
            font-size: 0.8rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            min-width: 200px;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .tooltip-label {
            color: var(--text-muted);
        }

        .tooltip-value {
            color: var(--text-main);
            font-weight: 600;
        }

        /* SVG Styles */
        .node circle {
            stroke-width: 1.5px;
            transition: r 0.2s;
        }

        .node:hover circle {
            r: 6px;
            stroke: #fff;
        }

        .link {
            fill: none;
            stroke: var(--link-color);
            stroke-opacity: 0.4;
            stroke-width: 1.5px;
        }

        .label {
            font-size: 8px;
            fill: var(--text-muted);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div id="container">
        <header>
            <div class="title-group">
                <h1>Global Sales Hierarchy</h1>
                <p id="stats">Loading sales data visualization...</p>
            </div>
            <div class="actions">
                <button class="btn" onclick="resetZoom()">Reset View</button>
            </div>
        </header>

        <div id="viz-area"></div>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p>Parsing Hierarchy Data...</p>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Large datasets may take a few
            seconds</p>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script src="script.js"></script>
</body>

</html>
