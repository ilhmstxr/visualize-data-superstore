<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sales Hierarchy Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --node-branch: #6366f1;
            --node-leaf: #10b981;
            --link-color: #334155;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-group p {
            margin: 0.25rem 0 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        #viz-area {
            flex-grow: 1;
            position: relative;
            cursor: grab;
        }

        #viz-area:active {
            cursor: grabbing;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: #2d3a4f;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Tooltip style */
        .tooltip {
            position: absolute;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--accent);
            border-radius: 0.75rem;
            pointer-events: none;
            font-size: 0.8rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            min-width: 200px;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .tooltip-label {
            color: var(--text-muted);
        }

        .tooltip-value {
            color: var(--text-main);
            font-weight: 600;
        }

        /* SVG Styles */
        .node circle {
            stroke-width: 1.5px;
            transition: r 0.2s;
        }

        .node:hover circle {
            r: 6px;
            stroke: #fff;
        }

        .link {
            fill: none;
            stroke: var(--link-color);
            stroke-opacity: 0.4;
            stroke-width: 1.5px;
        }

        .label {
            font-size: 8px;
            fill: var(--text-muted);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div id="container">
        <header>
            <div class="title-group">
                <h1>Global Sales Hierarchy</h1>
                <p id="stats">Loading sales data visualization...</p>
            </div>
            <div class="actions">
                <button class="btn" onclick="resetZoom()">Reset View</button>
            </div>
        </header>

        <div id="viz-area"></div>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p>Parsing Hierarchy Data...</p>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Large datasets may take a few
            seconds</p>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        let svg, g, zoom, root, treeLayout;
        let i = 0;
        const width = window.innerWidth;
        const height = window.innerHeight - 80;
        const margin = { top: 20, right: 120, bottom: 20, left: 120 };

        async function init() {
            try {
                // Fetch the JSON data
                // const response = await fetch('clean_hierarchy_quarter.json');
                const response = await fetch('aggregated_hierarchy_data.json');
                const data = await response.json();

                render(data);

                // Hide loader
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                }, 500);

                // Update stats
                const totalNodes = d3.hierarchy(data).descendants().length;
                document.getElementById('stats').innerText = `Visualizing ${totalNodes.toLocaleString()} data points (Collapsible Tree)`;

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('loader').innerHTML = `
                    <div style="color: #ef4444; text-align: center; padding: 2rem;">
                        <h3>Failed to load data</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 1rem;">Make sure you are running this file through a web server (like Live Server or Laragon localhost)</p>
                    </div>
                `;
            }
        }

        function render(data) {
            const vizArea = d3.select("#viz-area");
            vizArea.selectAll("*").remove();

            svg = vizArea.append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .attr("viewBox", [0, 0, width, height]);

            zoom = d3.zoom()
                .scaleExtent([0.1, 8])
                .on("zoom", (event) => {
                    g.attr("transform", event.transform);
                });

            svg.call(zoom);

            g = svg.append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            // Use fixed node size for a consistent vertical layout
            treeLayout = d3.tree().nodeSize([30, 250]);

            root = d3.hierarchy(data);
            root.x0 = height / 2;
            root.y0 = 0;

            // Initialize all nodes and collapse them to prevent lag
            root.descendants().forEach((d) => {
                d.id = ++i;
                d._children = d.children;
            });

            // Collapse all nodes past the first level initially
            function collapse(d) {
                if (d.children) {
                    d._children = d.children;
                    d._children.forEach(collapse);
                    d.children = null;
                }
            }

            if (root.children) {
                root.children.forEach(collapse);
            }

            update(root);

            // Set initial zoom centered
            svg.call(zoom.transform, d3.zoomIdentity.translate(width / 4, height / 2).scale(0.8));
        }

        function update(source) {
            const treeData = treeLayout(root);
            const nodes = treeData.descendants();
            const links = treeData.links();

            // Normalize for fixed-depth
            nodes.forEach(d => { d.y = d.depth * 250 });

            // ****************** Nodes section ***************************
            const node = g.selectAll('g.node')
                .data(nodes, d => d.id || (d.id = ++i));

            const nodeEnter = node.enter().append('g')
                .attr('class', 'node')
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on('click', click)
                .on("mouseover", showTooltip)
                .on("mouseout", hideTooltip);

            nodeEnter.append('circle')
                .attr('class', 'node')
                .attr('r', 1e-6)
                .style("fill", d => d._children ? "var(--node-branch)" : "var(--node-leaf)")
                .style("filter", "drop-shadow(0 0 2px rgba(99, 102, 241, 0.5))");

            nodeEnter.append('text')
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .style("fill", "var(--text-muted)")
                .style("font-size", "11px")
                .text(d => d.data.name)
                .style("fill-opacity", 1e-6);

            const nodeUpdate = nodeEnter.merge(node);

            nodeUpdate.transition()
                .duration(750)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select('circle.node')
                .attr('r', d => d.children || d._children ? 5 : 3)
                .style("fill", d => d._children ? "var(--node-branch)" : "var(--node-leaf)")
                .attr('cursor', 'pointer');

            nodeUpdate.select('text')
                .style("fill-opacity", 1);

            const nodeExit = node.exit().transition()
                .duration(750)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            nodeExit.select('circle')
                .attr('r', 1e-6);

            nodeExit.select('text')
                .style("fill-opacity", 1e-6);

            // ****************** links section ***************************
            const link = g.selectAll('path.link')
                .data(links, d => d.target.id);

            const linkEnter = link.enter().insert('path', "g")
                .attr("class", "link")
                .attr('d', d => {
                    const o = { x: source.x0, y: source.y0 };
                    return diagonal(o, o);
                });

            const linkUpdate = linkEnter.merge(link);

            linkUpdate.transition()
                .duration(750)
                .attr('d', d => diagonal(d.source, d.target));

            const linkExit = link.exit().transition()
                .duration(750)
                .attr('d', d => {
                    const o = { x: source.x, y: source.y };
                    return diagonal(o, o);
                })
                .remove();

            nodes.forEach(d => {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }

        // Toggle children on click
        function click(event, d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
        }

        // Diagonal generator for horizontal tree
        function diagonal(s, d) {
            return `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
        }

        function showTooltip(event, d) {
            const tooltip = d3.select("#tooltip");
            const data = d.data;

            let content = `<div style="font-weight: bold; color: var(--accent); border-bottom: 1px solid #334155; margin-bottom: 0.5rem; padding-bottom: 0.25rem;">${data.name}</div>`;

            if (data["Order ID"]) {
                content += `
                    <div class="tooltip-row"><span class="tooltip-label">Order ID:</span> <span class="tooltip-value">${data["Order ID"]}</span></div>
                    <div class="tooltip-row"><span class="tooltip-label">Customer:</span> <span class="tooltip-value">${data["Customer Name"]}</span></div>
                    <div class="tooltip-row"><span class="tooltip-label">Product:</span> <span class="tooltip-value" style="font-size: 0.7rem; text-align: right; margin-left: 10px;">${data["Product Name"]}</span></div>
                    <div class="tooltip-row"><span class="tooltip-label">Sales:</span> <span class="tooltip-value" style="color: #10b981;">$${data["Sales"]}</span></div>
                    <div class="tooltip-row"><span class="tooltip-label">Profit:</span> <span class="tooltip-value" style="color: ${parseFloat(String(data["Profit"]).replace(',', '.')) >= 0 ? '#10b981' : '#ef4444'};">$${data["Profit"]}</span></div>
                `;
            } else {
                content += `<div class="tooltip-row"><span class="tooltip-label">Type:</span> <span class="tooltip-value">${d._children || d.children ? "Organizational Node" : "Leaf Node"}</span></div>`;
                content += `<div class="tooltip-row"><span class="tooltip-label">Child Nodes:</span> <span class="tooltip-value">${d.children ? d.children.length : (d._children ? d._children.length : 0)}</span></div>`;

                if (data["Sales"] !== undefined && data["Profit"] !== undefined) {
                    content += `<div class="tooltip-row"><span class="tooltip-label">Total Sales:</span> <span class="tooltip-value" style="color: #10b981;">$${data["Sales"]}</span></div>`;
                    content += `<div class="tooltip-row"><span class="tooltip-label">Total Profit:</span> <span class="tooltip-value" style="color: ${parseFloat(String(data["Profit"]).replace(',', '.')) >= 0 ? '#10b981' : '#ef4444'};">$${data["Profit"]}</span></div>`;
                }
            }

            tooltip
                .style("display", "block")
                .html(content)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 20) + "px");

            d3.select(event.currentTarget).select("circle").attr("r", 8);
        }

        function hideTooltip(event, d) {
            d3.select("#tooltip").style("display", "none");
            d3.select(event.currentTarget).select("circle").attr("r", d.children || d._children ? 5 : 3);
        }

        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity.translate(width / 4, height / 2).scale(0.8)
            );
        }

        // Handle resize
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight - 80;
            d3.select("svg")
                .attr("width", newWidth)
                .attr("height", newHeight);
        });

        init();
    </script>
</body>

</html>
